name: Generate XMLTV File

on:
  schedule:
    - cron: "0 3 * * *"  # Executa diariamente às 3h da manhã
  workflow_dispatch:  # Permite execução manual

jobs:
  generate_xmltv:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run script
      run: |
        python generate_xmltv.py

    - name: Clear GitHub actions cache (opcional para evitar erros de versão)
      run: rm -rf ~/.cache/gh-actions

    - name: Upload XMLTV file
      uses: actions/upload-artifact@v3
      with:
        name: programacao-xmltv
        path: programacao.xml
