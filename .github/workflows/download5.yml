name: Sync EPG Files

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'    # Às 01:00 UTC, correspondente a 22:00 no horário de Brasília (UTC-3)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Download files
      run: |
        wget -O epg4.xml.gz http://m3u4u.com/epg/w16vy5vpp1cx6972n39p
        wget -O guide.xml https://raw.githubusercontent.com/Neywerson/GuideTV/BR3/guide.xml
        wget -O br.xml https://i.mjh.nz/PlutoTV/br.xml

    - name: Validate br.xml
      run: |
        if [ ! -s br.xml ]; then
          echo "Erro: O arquivo br.xml está vazio ou não foi baixado corretamente."
          exit 1
        fi
        echo "Primeiras linhas do arquivo br.xml:"
        head -n 20 br.xml

    - name: Remove unwanted channels and programmes in br.xml
      run: |
        python <<EOF
        import xml.etree.ElementTree as ET

        # IDs completos ou termos condicionalmente removidos
        termo_remocao = "pluto"

        try:
            # Carregar o arquivo br.xml
            tree = ET.parse('br.xml')
            root = tree.getroot()

            # Função para remover elementos com IDs contendo o termo
            def remover_elementos_por_termo(root, tag, atributo, termo):
                removidos = []
                for elemento in root.findall(tag):
                    if termo.lower() in elemento.get(atributo, '').lower():  # Busca insensitiva
                        removidos.append(elemento.get(atributo))
                        root.remove(elemento)
                return removidos

            # Remover canais e programas com IDs contendo o termo "pluto"
            canais_removidos = remover_elementos_por_termo(root, 'channel', 'id', termo_remocao)
            programas_removidos = remover_elementos_por_termo(root, 'programme', 'channel', termo_remocao)

            # Mensagens de depuração
            print(f"Canais removidos com '{termo_remocao}': {canais_removidos}")
            print(f"Programas removidos com '{termo_remocao}': {programas_removidos}")

            # Salvar o arquivo atualizado
            tree.write('br.xml', encoding='utf-8', xml_declaration=True)

        except ET.ParseError as e:
            print(f"Erro ao analisar br.xml: {e}")
            raise
        EOF

    - name: Combine XML files into epg_combinado.xml
      run: |
        python <<EOF
        import os
        import xml.etree.ElementTree as ET

        def carregar_xml(caminho):
            if not os.path.exists(caminho) or os.path.getsize(caminho) == 0:
                print(f"Arquivo {caminho} está vazio ou não disponível. Ignorando...")
                return None
            try:
                return ET.parse(caminho).getroot()
            except ET.ParseError as e:
                print(f"Erro ao analisar {caminho}: {e}. Ignorando...")
                return None

        # Carregar os arquivos XML
        root_epg4 = carregar_xml('epg4.xml')
        root_guide = carregar_xml('guide.xml') or ET.Element('tv')  # Use uma estrutura vazia se inválido
        root_br = carregar_xml('br.xml')

        # Criar a estrutura combinada
        root_combined = ET.Element('tv', attrib={
            'generator-info-name': 'm3u4u',
            'generator-info-url': 'https://m3u4u.com/'
        })
        
        # Função para adicionar elementos de um arquivo ao XML combinado
        def adicionar_elementos(source_root, combined_root):
            if source_root is not None:
                for channel in source_root.findall('channel'):
                    combined_root.append(channel)
                for programme in source_root.findall('programme'):
                    combined_root.append(programme)

        # Adicionar elementos dos arquivos válidos
        adicionar_elementos(root_epg4, root_combined)
        adicionar_elementos(root_guide, root_combined)
        adicionar_elementos(root_br, root_combined)

        # Salvar o arquivo combinado
        tree_combined = ET.ElementTree(root_combined)
        tree_combined.write('epg_combinado.xml', encoding='utf-8', xml_declaration=True)
        EOF

    - name: Commit and push if it changed
      run: |
        git config user.name "Automated"
        git config user.email "eduardo@ebonini.com.br"
        git add -A
        timestamp=$(date -u)
        git commit -m "Automated file process at $timestamp" || exit 0
        git push https://$GITHUB_ACTOR:$GITHUB_TOKEN@github.com/ebonini/epg_2.0.git
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
