name: Sync EPG Files

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'    # At 01:00 every day UTC
    - cron: '0 13 * * *'  # At 13:00 every day UTC

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Download files
      run: |
        wget -O epg4.xml.gz http://m3u4u.com/epg/w16vy5vpp1cx6972n39p
        wget -O guide.xml https://raw.githubusercontent.com/Neywerson/GuideTV/BR3/guide.xml

    - name: Extract files
      run: |
        gzip -d epg4.xml.gz || true  # Ignorar erro se não for arquivo compactado
        # O arquivo "guide.xml" já está no formato XML e não precisa de descompactação

    - name: Edit and combine XMLs
      run: |
        python <<EOF
        import xml.etree.ElementTree as ET

        # Função para editar XML
        def editar_xml(caminho_arquivo):
            tree = ET.parse(caminho_arquivo)
            root = tree.getroot()
            novo_elemento = ET.Element('NovoElemento')
            novo_elemento.text = 'Valor Exemplo'
            root.append(novo_elemento)
            return root

        # Editar os dois arquivos
        root1 = editar_xml('epg4.xml')
        root2 = editar_xml('guide.xml')

        # Combinar os arquivos
        root_combined = ET.Element('RootCombinado')
        root_combined.extend(root1)
        root_combined.extend(root2)

        # Salvar arquivo combinado
        tree_combined = ET.ElementTree(root_combined)
        tree_combined.write('epg_combinado.xml', encoding='utf-8')
        EOF

    - name: Commit and push if it changed
      run: |
        git config user.name "Automated"
        git config user.email "eduardo@ebonini.com.br"
        git add -A
        timestamp=$(date -u)
        git commit -m "Automated file process at $timestamp" || exit 0
        git push
