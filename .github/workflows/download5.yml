    - name: Adjust channel IDs in guide_br1.xml
      run: |
        python <<EOF
        import xml.etree.ElementTree as ET

        # Mapeamento dos IDs antigos para os novos
        id_map = {
            "4675": "RUNTIMEACAO",
            "6806": "RUNTIMEFAMILIA",
            "6800": "RUNTIMECINESPANTO",
            "2967": "RUNTIME",
            "6802": "RUNTIMECRIME",
            "4677": "RUNTIMECOMEDIA",
            "6804": "RUNTIMEROMANCE"
        }

        # Carregar o arquivo guide_br1.xml
        tree = ET.parse('guide_br1.xml')
        root = tree.getroot()

        # Substituir IDs nos elementos <channel>
        for channel in root.findall('channel'):
            old_id = channel.get('id')
            if old_id in id_map:
                channel.set('id', id_map[old_id])

        # Substituir IDs no atributo "channel" dos elementos <programme>
        for programme in root.findall('programme'):
            channel_id = programme.get('channel')
            if channel_id in id_map:
                programme.set('channel', id_map[channel_id])

        # Salvar o arquivo atualizado
        tree.write('guide_br1.xml', encoding='utf-8', xml_declaration=True)
        EOF

    - name: Process and combine XMLs
      run: |
        python <<EOF
        import xml.etree.ElementTree as ET
        import gzip

        # Função para carregar XML
        def carregar_xml(caminho_arquivo):
            tree = ET.parse(caminho_arquivo)
            return tree.getroot()

        # Função para aplicar indentação de forma precisa
        def identar_elemento(elemento, nivel=0):
            espaco = "  "  # 2 espaços para indentação
            if len(elemento):  # Se o elemento tem filhos
                if not elemento.text or not elemento.text.strip():
                    elemento.text = f"\n{espaco * (nivel + 1)}"
                for filho in elemento:
                    identar_elemento(filho, nivel + 1)
                if not elemento.tail or not elemento.tail.strip():
                    elemento.tail = f"\n{espaco * nivel}"
            else:  # Se o elemento não tem filhos
                if not elemento.tail or not elemento.tail.strip():
                    elemento.tail = f"\n{espaco * nivel}"

        # Criar a raiz com o cabeçalho especificado
        root_combined = ET.Element('tv', attrib={
            'generator-info-name': 'm3u4u',
            'generator-info-url': 'https://m3u4u.com/'
        })
        canais_combined = []
        programas_combined = []

        # Processar arquivo epg4.xml
        root1 = carregar_xml('epg4.xml')
        canais_combined.extend(root1.findall('./channel'))
        programas_combined.extend(root1.findall('./programme'))

        # Processar arquivo guide_filtered.xml
        root2 = carregar_xml('guide_filtered.xml')
        canais_combined.extend(root2.findall('./channel'))
        programas_combined.extend(root2.findall('./programme'))

        # Processar arquivo guide_br1.xml
        root3 = carregar_xml('guide_br1.xml')
        canais_combined.extend(root3.findall('./channel'))
        programas_combined.extend(root3.findall('./programme'))

        # Adicionar elementos <channel> ao XML combinado
        for canal in canais_combined:
            root_combined.append(canal)

        # Adicionar elementos <programme> ao XML combinado
        for programa in programas_combined:
            root_combined.append(programa)

        # Aplicar indentação ao XML combinado
        identar_elemento(root_combined)

        # Salvar o XML combinado com o cabeçalho e indentação correta
        tree_combined = ET.ElementTree(root_combined)
        tree_combined.write('epg_combinado.xml', encoding='utf-8', xml_declaration=True)

        # Compactar o arquivo gerado no formato .gz
        with open('epg_combinado.xml', 'rb') as f_in:
            with gzip.open('epg_combinado.xml.gz', 'wb') as f_out:
                f_out.write(f_in.read())
        EOF

    - name: Commit and push if it changed
      run: |
        git config user.name "Automated"
        git config user.email "eduardo@ebonini.com.br"
        git add -A
        timestamp=$(date -u)
        git commit -m "Automated file process at $timestamp" || exit 0
        git push https://$GITHUB_ACTOR:$GITHUB_TOKEN@github.com/ebonini/epg_2.0.git
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
